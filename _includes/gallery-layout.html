 <!-- Single Gallery -->
<div class="col-lg-12">
  <div id="imageGallery{% if include.id_number %}-{{ include.id_number }}{% endif %}">
    <div id="gallery-sizer{% if include.id_number %}-{{ include.id_number }}{% endif %}"></div>
    {% for picture in include.gallery.pictures %}
      <a href="{{ site.url }}{{ site.baseurl }}/assets/img/gallery/{{ include.gallery.picture_path }}/{{ picture.original }}"
      data-responsive="{% for size in picture.sizes %} {{ site.url}}{{ site.baseurl }}/assets/gallery/{{ include.gallery.picture_path }}/{{ size }}{% endfor %}" class="image"
      {% if picture.title %} data-sub-html="<div class='lg-toolbar caption'><h4>{{ picture.title | escape }}</h4>{% if picture.caption %}<p>{{ picture.caption | escape }}</p>{% endif %}</div>"{% endif %}>
        <img alt="{{ picture.title }}" class="img-thumbnail" src="{{ site.url }}{{ site.baseurl }}/assets/img/gallery/{{ include.gallery.picture_path }}/{{ picture.thumbnail }}" />
      </a>
    {% endfor %}
    </div>
</div>

<style>
  #imageGallery{% if include.id_number %}-{{ include.id_number }}{% endif %} img {
    image-rendering: -webkit-optimize-contrast;
    image-rendering: crisp-edges;
  }
</style>

<script type="text/javascript">
    $(document).ready(function() {
        $("#imageGallery{% if include.id_number %}-{{ include.id_number }}{% endif %}").lightGallery({
          thumbnail: false,
          selector: '.image',
          mode: 'lg-fade',
          cssEasing: 'cubic-bezier(0.25, 0, 0.25, 1)',
          speed: 400,
          download: true,
          counter: true,
          actualSize: true,
          zoom: true,
          scale: 1,
          enableDrag: true,
          enableSwipe: true
        });
    });
</script>
